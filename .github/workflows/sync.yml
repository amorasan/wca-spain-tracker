name: Sync WCA Spain

on:
  schedule:
    # Cada 6 horas en punto (UTC). Ajusta a gusto.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_digest:
        description: "Enviar el resumen completo aunque no sea lunes"
        required: false
        default: "false"

# Necesario para poder commitear data/competitions.json de vuelta al repo
permissions:
  contents: write

concurrency:
  group: wca-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run fetcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_DIGEST: ${{ inputs.force_digest == 'true' && '1' || '' }}
        run: python fetcher.py

      - name: Commit state if changed
        run: |
          changed=""
          [[ -n "$(git status --porcelain data/competitions.json)" ]] && changed="data/competitions.json"
          [[ -n "$(git status --porcelain data/subscribers.json)" ]] && changed="$changed data/subscribers.json"
          if [[ -n "$changed" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $changed
            git pull --rebase --autostash
            git commit -m "chore: update WCA Spain state [skip ci]"
            git push
          fi
